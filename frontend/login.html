<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Pulse - Connect Xero</title>
  <style>
    :root {
      --bg: #f4f3ef;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 15% 20%, #ebe9e1 0%, var(--bg) 45%, #efede8 100%);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 18px;
      font-weight: 700;
      background: var(--accent);
      color: var(--accent-ink);
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(0.95); }
    .fallback {
      display: block;
      margin-top: 14px;
      text-align: center;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .small {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Business Pulse</h1>
    <p>Connect your Xero organization to open the dashboard.</p>
    <form action="/auth/start" method="get">
      <button class="btn" type="submit">Connect Xero</button>
    </form>
    <a class="fallback" href="/auth/start">If the button does not respond, continue here</a>
    <div class="small">You will be redirected back automatically after login.</div>
  </main>
</body>
</html>
