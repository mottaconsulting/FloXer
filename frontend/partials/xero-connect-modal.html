<div id="xeroConnectModal" class="xero-connect-modal" aria-hidden="true">
  <section class="xero-connect-card" role="dialog" aria-modal="true" aria-labelledby="xeroConnectTitle">
    <div class="xero-connect-icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="xero-connect-icon"><path d="M15 7h3a5 5 0 1 1 0 10h-3"></path><path d="M9 17H6a5 5 0 0 1 0-10h3"></path><path d="m8 12 8 0"></path></svg>
    </div>
    <h2 id="xeroConnectTitle" class="xero-connect-title">Connect your Xero account</h2>
    <p class="xero-connect-text">
      To display your cash flow data, we need access to your Xero organisation. You will be redirected to Xero to authorise securely.
    </p>
    <button type="button" class="xero-connect-primary" onclick="authorize()">
      <span class="xero-connect-button-text">Continue with</span>
      <span class="xero-connect-xero-pill"><span class="xero-connect-xero-dot">x</span>XERO</span>
    </button>
    <button type="button" class="xero-connect-secondary" onclick="hideXeroConnectModal()">Maybe later</button>
    <p class="xero-connect-footer"><svg viewBox="0 0 24 24" class="xero-connect-footer-icon" aria-hidden="true"><path d="M12 3 5 6v5c0 4.5 3 7.3 7 10 4-2.7 7-5.5 7-10V6l-7-3z"></path><path d="m9.7 12.2 1.8 1.8 3-3.2"></path></svg>Secured with OAuth 2.0 - we never store your Xero password</p>
  </section>
</div>
