services:
  - type: web
    name: mmxeroapi
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://mmxeroapi.onrender.com
      - key: CSP_EXTRA_SCRIPT_SRC
        value: https://cdn.jsdelivr.net
      - key: CSP_EXTRA_STYLE_SRC
        value: https://fonts.googleapis.com
      - key: CSP_EXTRA_FONT_SRC
        value: https://fonts.gstatic.com