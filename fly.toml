app = "floxer"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  APP_ENV = "production"
  CSP_EXTRA_SCRIPT_SRC = "https://cdn.jsdelivr.net"
  CSP_EXTRA_STYLE_SRC = "https://fonts.googleapis.com"
  CSP_EXTRA_FONT_SRC = "https://fonts.gstatic.com"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
